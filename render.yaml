services:
  - type: web
    name: jo-ai
    runtime: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: PROCESS_ROLE
        value: web
      - key: LOG_LEVEL
        value: INFO
      - key: NVIDIA_CHAT_MODEL
        value: meta/llama-3.1-8b-instruct
      - key: IMAGE_MODEL
        value: black-forest-labs/flux.1-dev
      - key: DEEPSEEK_MODEL
        value: deepseek-ai/deepseek-v3.2
      - key: KIMI_MODEL
        value: moonshotai/kimi-k2.5
      # Manual check: keep this aligned with the final GitHub Pages URL for ygirma315-cell/jo-ai.
      - key: MINIAPP_URL
        value: https://ygirma315-cell.github.io/jo-ai/
      - key: BOT_TOKEN
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: KIMI_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
