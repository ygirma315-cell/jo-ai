<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>JO AI Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/static/style.css?v=3.0.0">
  <script src="/admin/static/app.js?v=3.0.0" defer></script>
</head>
<body>
  <div id="loginOverlay" class="login-overlay">
    <form id="loginForm" class="login-card">
      <h1>JO AI Admin</h1>
      <p id="loginSubtitle">Sign in to view bot users.</p>
      <label for="tokenSigninInput">Admin token</label>
      <div class="login-row">
        <input id="tokenSigninInput" type="password" placeholder="Enter admin token" autocomplete="current-password">
        <button id="tokenSigninBtn" type="submit" class="btn primary">Sign In</button>
      </div>
      <div class="divider"><span>or</span></div>
      <button id="telegramLoginBtn" type="button" class="btn">Login with Telegram</button>
      <div id="telegramWidgetWrap" class="telegram-widget-wrap">
        <script async src="https://telegram.org/js/telegram-widget.js?22"
          data-telegram-login="Joaiibot"
          data-size="large"
          data-userpic="false"
          data-request-access="write"
          data-onauth="onTelegramAuth(user)"></script>
      </div>
      <p id="loginHint" class="hint">Approved admins can use token or Telegram login when enabled.</p>
      <p id="loginError" class="error" hidden></p>
    </form>
  </div>

  <main id="shell" class="shell" hidden>
    <header class="topbar">
      <div>
        <p class="eyebrow">JO AI Control</p>
        <h1>Users</h1>
      </div>
      <div class="actions">
        <button id="refreshBtn" class="btn" type="button">Refresh</button>
        <button id="logoutBtn" class="btn danger" type="button">Logout</button>
      </div>
    </header>

    <section class="summary">
      <article class="metric">
        <span>Users Started Bot</span>
        <strong id="startedUsersCount">0</strong>
      </article>
      <article class="metric">
        <span>Total Users</span>
        <strong id="totalUsersCount">0</strong>
      </article>
    </section>

    <section class="panel">
      <div class="toolbar">
        <input id="usersSearch" type="search" placeholder="Search name, username, or Telegram ID">
        <button id="usersApply" class="btn primary" type="button">Search</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Telegram ID</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr><td colspan="2">Loading users...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pager">
        <button id="usersPrev" class="btn" type="button">Prev</button>
        <span id="usersPageInfo">Page 1</span>
        <button id="usersNext" class="btn" type="button">Next</button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>
</body>
</html>
